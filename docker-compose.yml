services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bauk
      POSTGRES_PASSWORD: bauk
      POSTGRES_DB: bauk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bauk -d bauk"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bauk
      DB_PASS: bauk
      DB_NAME: bauk
      JWT_SECRET: change_me_in_production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
